<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lead Generator v8.0 — JSP Coders</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🗺️ Lead Machine</h2>
      <span class="badge">v8.0 PRO</span>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
    </div>
    <p class="subtitle">Multi-Platform Lead Generation Suite by <strong>JSP Coders</strong></p>

    <div class="alert" id="alertBox" style="display:none"></div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel" style="display:none">
      <div class="settings-title">⚙️ Settings</div>
      <label class="settings-label">Country code (prefixed to 10-digit numbers for WhatsApp)
        <input type="text" id="countryCodeInput" maxlength="4" placeholder="91">
      </label>
      <label class="settings-label">WhatsApp message template ({name} = business name)
        <textarea id="waTemplateInput" rows="3"></textarea>
      </label>
      <div class="settings-row">
        <label class="settings-label">Scroll rounds
          <input type="number" id="scrollRoundsInput" min="1" max="40">
        </label>
        <label class="settings-label">Enrich limit
          <input type="number" id="enrichCapInput" min="1" max="500">
        </label>
      </div>
      <button id="saveSettingsBtn" class="btn btn-primary btn-sm">💾 Save Settings</button>
    </div>

    <!-- Quick Search & Filter Controls -->
    <div class="filter-bar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search leads by name, city..." />
        <button id="clearSearchBtn" class="clear-search-btn" title="Clear Search">&times;</button>
      </div>
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip chip-hot" data-filter="hot">🔥 Hot Deals</button>
        <button class="chip chip-phone" data-filter="phone">📞 Phone</button>
        <button class="chip chip-noweb" data-filter="noweb">🌐 No Web</button>
      </div>
    </div>

    <!-- Main Action Buttons -->
    <div class="controls">
      <button id="scrapeBtn" class="btn btn-primary">⚡ Scrape This Page</button>
      <div class="export-group">
        <button id="scrollBtn" class="btn btn-secondary">📜 Scroll &amp; Load More</button>
        <button id="autoBtn" class="btn btn-secondary">🤖 Auto-Collect All</button>
      </div>
      <button id="enrichBtn" class="btn btn-warning" disabled>📞 Fetch Phone &amp; Details</button>
      <button id="cancelBtn" class="btn btn-danger" style="display:none">✋ Cancel</button>

      <!-- Progress Bar -->
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
        <span class="progress-label" id="progressLabel"></span>
      </div>

      <div class="export-group">
        <button id="exportXlsxBtn" class="btn btn-success" disabled>📥 Export Excel (.xlsx)</button>
        <button id="exportCsvBtn" class="btn btn-secondary" disabled>📄 Export CSV</button>
      </div>
      <div class="export-group">
        <button id="exportVcfBtn" class="btn btn-info" disabled>📇 Export Phone Contacts (.vcf)</button>
        <button id="clearBtn" class="btn btn-ghost">🗑️ Clear</button>
      </div>
    </div>

    <!-- Live Analytics & Status Panel -->
    <div class="status-panel">
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-label">Total Leads</span>
          <span id="leadCount" class="stat-value">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">With Phone</span>
          <span id="phoneCount" class="stat-value">0</span>
        </div>
        <div class="stat-box stat-box-hot">
          <span class="stat-label">🔥 Hot Deals</span>
          <span id="hotCount" class="stat-value">0</span>
        </div>
      </div>
      <div id="statusText" class="status-text">
        Open Google Maps or Search, then click "Scrape This Page"
      </div>
    </div>

    <!-- Lead List -->
    <div class="lead-list" id="leadList"></div>

    <div class="developer-footer">
      Engineered with ❤️ by <span class="dev-name">JSP Coders</span>
    </div>
  </div>
  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
